<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#0f0f13"/>
  <!-- Large green bubble — low AI exposure, many workers -->
  <circle cx="9" cy="22" r="7.5" fill="#1eb428"/>
  <!-- Medium amber bubble — mid AI exposure -->
